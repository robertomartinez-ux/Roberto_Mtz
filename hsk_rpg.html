<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HSK RPG</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

#map{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
max-width:800px;
margin:auto;
}

.zone{
background:#1e293b;
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.zone:hover{
background:#334155;
}

#game{
margin-top:30px;
padding:20px;
background:#111827;
border-radius:10px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

input{
padding:12px;
font-size:16px;
width:80%;
max-width:300px;
border-radius:6px;
border:none;
outline:none;
}

button{
padding:12px 20px;
margin-top:12px;
font-size:18px;
border-radius:8px;
}

#log{
margin-top:15px;
color:#4ade80;
}
  

@media (max-width:600px){

body{padding:15px}

.zone{font-size:16px}

input{width:90%}

button{width:90%}

}

</style>

</head>

<body>

<h1>🐉 HSK RPG</h1>

<p>Nivel: <span id="level">1</span> | XP: <span id="xp">0</span>/100</p>

<h2>🗺️ Mapa</h2>

<div id="map">

<div class="zone" onclick="startZone('saludos')">🏡 Aldea del Saludo</div>

<div class="zone" onclick="startZone('familia')">👨‍👩‍👧 Villa de la Familia</div>

<div class="zone" onclick="startZone('numeros')">🔢 Torre de los Números</div>

<div class="zone" onclick="startZone('lugares')">🏫 Ciudad de los Lugares</div>

<div class="zone" onclick="startZone('boss')">👹 BOSS: Maestro Wang</div>

</div>

<div id="game" style="display:none">

<h2 id="question"></h2>

<input id="answer">

<br>

<button onclick="checkAnswer()">Responder</button>

<div id="log"></div>

</div>
<div id="bossBar" style="display:none;margin-top:20px">

<p>👹 Maestro Wang</p>

<div style="background:#374151;border-radius:10px;height:25px;width:100%;max-width:600px;margin:auto">

<div id="bossHPbar"
style="
background:#ef4444;
height:25px;
width:100%;
border-radius:10px;
transition:0.3s;
"></div>

</div>

</div>

<script>

/* ---------------- NPC NOMBRES ---------------- */

let npcNames = {

npc1:"Aldeano Li",
npc2:"Estudiante Mei",
npc3:"Maestro Chen",
npc4:"Comerciante Wang"

}

/* ---------------- PROGRESO ---------------- */

let completedZones = {

saludos:false,
familia:false,
numeros:false,
lugares:false,
boss:false

}

let xp=0
let level=1

let currentQuestion={}
let currentZone=""
let currentNPC="npc1"
let questionIndex=0
let bossHP = 100
let bossMaxHP = 100

/* ---------------- BANCO DE PREGUNTAS ---------------- */
/* SOLO LLENA ESTO */

let hsk1Questions = [

/* SALUDOS */

{zone:"saludos",q:"¿Cómo se dice hola?",a:"你好"},
{zone:"saludos",q:"¿Cómo se dice gracias?",a:"谢谢"},
{zone:"saludos",q:"¿Cómo se dice adiós?",a:"再见"},
{zone:"saludos",q:"¿Cómo se dice por favor?",a:"请"},

{zone:"saludos",q:"¿Qué significa 这?",a:"esto"},
{zone:"saludos",q:"¿Qué significa 那?",a:"eso"},

/* FAMILIA */

{zone:"familia",q:"¿Cómo se dice papá?",a:"爸爸"},
{zone:"familia",q:"¿Cómo se dice hijo?",a:"儿子"},
{zone:"familia",q:"¿Cómo se dice hija?",a:"女儿"},
{zone:"familia",q:"¿Cómo se dice amigo?",a:"朋友"},
{zone:"familia",q:"¿Cómo se dice profesor?",a:"老师"},
{zone:"familia",q:"¿Cómo se dice estudiante?",a:"学生"},
{zone:"familia",q:"¿Cómo se dice médico?",a:"医生"},
{zone:"familia",q:"¿Cómo se dice señor?",a:"先生"},
{zone:"familia",q:"¿Cómo se dice señorita?",a:"小姐"},
{zone:"familia",q:"Traduce: 我爱妈妈",a:"amo a mama"},
{zone:"familia",q:"Traduce: 我爱爸爸",a:"amo a papa"},

/* NUMEROS */

{zone:"numeros",q:"¿Cómo se dice uno?",a:"一"},
{zone:"numeros",q:"¿Cómo se dice dos?",a:"二"},
{zone:"numeros",q:"¿Cómo se dice tres?",a:"三"},
{zone:"numeros",q:"¿Cómo se dice cuatro?",a:"四"},
{zone:"numeros",q:"¿Cómo se dice cinco?",a:"五"},
{zone:"numeros",q:"¿Cómo se dice seis?",a:"六"},
{zone:"numeros",q:"¿Cómo se dice siete?",a:"七"},
{zone:"numeros",q:"¿Cómo se dice ocho?",a:"八"},
{zone:"numeros",q:"¿Cómo se dice nueve?",a:"九"},
{zone:"numeros",q:"¿Cómo se dice diez?",a:"十"},
{zone:"numeros",q:"¿Qué significa 几?",a:"cuantos"},
{zone:"numeros",q:"¿Qué significa 多?",a:"mucho"},

/* LUGARES */

{zone:"lugares",q:"¿Qué significa 中国?",a:"china"},
{zone:"lugares",q:"¿Qué significa 美国?",a:"estados unidos"},
{zone:"lugares",q:"¿Qué significa 学校?",a:"escuela"},
{zone:"lugares",q:"¿Qué significa 医院?",a:"hospital"},
{zone:"lugares",q:"¿Qué significa 商店?",a:"tienda"},
{zone:"lugares",q:"¿Qué significa 家?",a:"casa"},
{zone:"lugares",q:"¿Cómo se dice casa?",a:"家"},
{zone:"lugares",q:"¿Cómo se dice trabajo?",a:"工作"},
{zone:"lugares",q:"¿Cómo se dice estudiar?",a:"学习"},
{zone:"lugares",q:"Ordena: 在 / 我 / 学校",a:"我在学校"},
{zone:"lugares",q:"Ordena: 去 / 我 / 商店",a:"我去商店"},
{zone:"lugares",q:"¿Qué significa 哪里?",a:"donde"},

/* BOSS */

{zone:"boss",q:"¿Qué significa 水?",a:"agua"},
{zone:"boss",q:"¿Qué significa 茶?",a:"te"},
{zone:"boss",q:"¿Qué significa 米饭?",a:"arroz"},
{zone:"boss",q:"¿Qué significa 苹果?",a:"manzana"},
{zone:"boss",q:"¿Qué significa 杯子?",a:"vaso"},
{zone:"boss",q:"¿Qué significa 猫?",a:"gato"},
{zone:"boss",q:"¿Qué significa 狗?",a:"perro"},
{zone:"boss",q:"¿Qué significa 书?",a:"libro"},
{zone:"boss",q:"¿Qué significa 钱?",a:"dinero"},
{zone:"boss",q:"¿Qué significa 车?",a:"carro"},
{zone:"boss",q:"Traduce: 我是学生",a:"soy estudiante"},
{zone:"boss",q:"Traduce: 他是老师",a:"el es profesor"},
{zone:"boss",q:"Traduce: 她是医生",a:"ella es doctora"},
{zone:"boss",q:"Traduce: 我是中国人",a:"soy chino"},
{zone:"boss",q:"Traduce: 他是美国人",a:"el es americano"},
{zone:"boss",q:"Traduce: 我爱你",a:"te amo"},
{zone:"boss",q:"Traduce: 我有朋友",a:"tengo amigos"},
{zone:"boss",q:"Traduce: 我有书",a:"tengo libros"},
{zone:"boss",q:"Completa: 我___学生",a:"是"},
{zone:"boss",q:"Completa: 他___老师",a:"是"},
{zone:"boss",q:"Completa: 我___中国人",a:"是"},
{zone:"boss",q:"Completa: 我___一个朋友",a:"有"},
{zone:"boss",q:"Completa: 我___一个书",a:"有"},
{zone:"boss",q:"¿Cómo se dice hoy?",a:"今天"},
{zone:"boss",q:"¿Cómo se dice mañana?",a:"明天"},
{zone:"boss",q:"¿Cómo se dice ayer?",a:"昨天"},
{zone:"boss",q:"¿Cómo se dice ahora?",a:"现在"},
{zone:"boss",q:"¿Cómo se dice tiempo?",a:"时间"},
{zone:"boss",q:"¿Cómo se dice ver?",a:"看"},
{zone:"boss",q:"¿Cómo se dice escuchar?",a:"听"},
{zone:"boss",q:"¿Cómo se dice hablar?",a:"说"},
{zone:"boss",q:"¿Cómo se dice comer?",a:"吃"},
{zone:"boss",q:"¿Cómo se dice beber?",a:"喝"},
{zone:"boss",q:"¿Cómo se dice comprar?",a:"买"},
{zone:"boss",q:"¿Cómo se dice ir?",a:"去"},
{zone:"boss",q:"¿Cómo se dice venir?",a:"来"},
{zone:"boss",q:"¿Cómo se dice vivir?",a:"住"},
{zone:"boss",q:"¿Cómo se dice llamar?",a:"叫"},
{zone:"boss",q:"¿Qué significa 大?",a:"grande"},
{zone:"boss",q:"¿Qué significa 小?",a:"pequeño"},
{zone:"boss",q:"¿Qué significa 好?",a:"bueno"},
{zone:"boss",q:"¿Qué significa 少?",a:"poco"},
{zone:"boss",q:"Traduce: 我喝水",a:"bebo agua"},
{zone:"boss",q:"Traduce: 我喝茶",a:"bebo te"},
{zone:"boss",q:"Traduce: 我吃米饭",a:"como arroz"},
{zone:"boss",q:"Traduce: 我买苹果",a:"compro manzanas"},
{zone:"boss",q:"Traduce: 我看书",a:"leo libros"},

]

/* ---------------- FILTRAR POR ZONA ---------------- */

function getQuestionsByZone(zone){

return hsk1Questions.filter(q=>q.zone===zone)

}

/* ---------------- PREGUNTAS POR NPC ---------------- */

function getQuestionsByNPC(zone,npc){

let zoneQuestions=getQuestionsByZone(zone)

let npcNumber=parseInt(npc.replace("npc",""))-1

let questionsPerNPC=Math.ceil(zoneQuestions.length/4)

let start=npcNumber*questionsPerNPC
let end=start+questionsPerNPC

return zoneQuestions.slice(start,end)

}

/* ---------------- INICIAR ZONA ---------------- */

function startZone(zone){

if(completedZones[zone]){
alert("✅ Zona completada")
return
}

document.getElementById("game").style.display="block"


currentZone=zone
currentNPC="npc1"
questionIndex=0

if(zone=="boss"){

bossHP=bossMaxHP

document.getElementById("bossBar").style.display="block"
document.getElementById("bossHPbar").style.background="#ef4444"

updateBossBar()

}else{

document.getElementById("bossBar").style.display="none"

}

loadQuestion()

}

/* ---------------- CARGAR PREGUNTA ---------------- */

function loadQuestion(){

let npcQuestions

if(currentZone=="boss"){

npcQuestions=getQuestionsByZone("boss")

if(npcQuestions.length===0){
alert("No hay preguntas para el boss")
return
}

currentQuestion=npcQuestions[Math.floor(Math.random()*npcQuestions.length)]

}else{

npcQuestions=getQuestionsByNPC(currentZone,currentNPC)

if(npcQuestions.length===0){
alert("No hay preguntas en esta zona")
return
}

currentQuestion=npcQuestions[questionIndex]

if(!currentQuestion){
questionIndex=0
currentQuestion=npcQuestions[questionIndex]
}

}

document.getElementById("question").innerText=currentQuestion.q

document.getElementById("log").innerText=
currentZone=="boss"
? "👹 Maestro Wang"
: "👤 Hablando con "+npcNames[currentNPC]

document.getElementById("answer").value=""
document.getElementById("answer").focus()

}

/* ---------------- RESPONDER ---------------- */

function checkAnswer(){

let user=document.getElementById("answer").value.trim()
let correct=currentQuestion.a.trim()
  
if(!currentQuestion) return
let correct=currentQuestion.a.toLowerCase()
  

if(user==correct){

xp+=20

if(currentZone=="boss"){
bossHP -= 10
updateBossBar()

if(bossHP <= 0){
return
}
}


document.getElementById("log").innerText="⚔️ Correcto +20XP"

}else{

document.getElementById("log").innerText="❌ Incorrecto. Respuesta: "+correct
document.getElementById("answer").value=""
}

if(xp>=100){

xp=0
level++

alert("🎉 Nivel "+level)

}

document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level

if(currentZone!="boss"){
questionIndex++
}

let npcQuestions

if(currentZone=="boss"){

npcQuestions=getQuestionsByZone("boss")

if(npcQuestions.length===0){
alert("No hay preguntas para el boss")
return
}

}else{

npcQuestions=getQuestionsByNPC(currentZone,currentNPC)

}

if(questionIndex>=npcQuestions.length){

questionIndex=0

if(currentNPC=="npc1") currentNPC="npc2"
else if(currentNPC=="npc2") currentNPC="npc3"
else if(currentNPC=="npc3") currentNPC="npc4"
else{

alert("🎉 Zona completada")

completedZones[currentZone]=true
disableZone(currentZone)

document.getElementById("game").style.display="none"

return

}

}

loadQuestion()

}

/* ---------------- DESHABILITAR ZONA ---------------- */

function disableZone(zone){

let buttons=document.querySelectorAll(".zone")

buttons.forEach(btn=>{

if(btn.getAttribute("onclick").includes(zone)){

btn.style.opacity="0.4"
btn.style.pointerEvents="none"
btn.innerHTML+=" ✔"

}

})

}
function updateBossBar(){

let percent = (bossHP / bossMaxHP) * 100

document.getElementById("bossHPbar").style.width = percent + "%"
  
if(percent < 50){
document.getElementById("bossHPbar").style.background="#f97316"
}

if(percent < 25){
document.getElementById("bossHPbar").style.background="#dc2626"
}
  
if(bossHP <= 0){

alert("🏆 DERROTASTE AL MAESTRO WANG")
completedZones.boss=true
disableZone("boss")

document.getElementById("game").style.display="none"
document.getElementById("bossBar").style.display="none"

bossHP = bossMaxHP

return

}

}

/* ---------------- ENTER RESPONDE ---------------- */

document.getElementById("answer").addEventListener("keydown",function(e){

if(e.key==="Enter"){
checkAnswer()
}

})

</script>

</body>

</html>
