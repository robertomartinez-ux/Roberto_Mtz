<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK RPG</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

#map{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
max-width:800px;
margin:auto;
}

.zone{
background:#1e293b;
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.zone:hover{
background:#334155;
}

#game{
margin-top:30px;
padding:20px;
background:#111827;
border-radius:10px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

input{
padding:12px;
font-size:16px;
width:80%;
max-width:300px;
}

button{
padding:12px 20px;
margin-top:12px;
font-size:18px;
border-radius:8px;
}

#log{
margin-top:15px;
color:#4ade80;
}
@media (max-width:600px){

body{
padding:15px;
}

#game{
padding:15px;
}

h1{
font-size:26px;
}

h2{
font-size:22px;
}

.zone{
padding:15px;
font-size:16px;
}

input{
width:90%;
max-width:none;
}

button{
width:90%;
}

}

</style>

</head>

<body>

<h1>🐉 HSK RPG</h1>

<p>Nivel: <span id="level">1</span> | XP: <span id="xp">0</span>/100</p>

<h2>🗺️ Mapa</h2>

<div id="map">

<div class="zone" onclick="startZone('saludos')">🏡 Aldea del Saludo</div>

<div class="zone" onclick="startZone('familia')">👨‍👩‍👧 Villa de la Familia</div>

<div class="zone" onclick="startZone('numeros')">🔢 Torre de los Números</div>

<div class="zone" onclick="startZone('lugares')">🏫 Ciudad de los Lugares</div>

<div class="zone" onclick="startZone('boss')">👹 BOSS: Maestro Wang</div>

</div>

<div id="game" style="display:none">

<h2 id="question"></h2>

<input id="answer">

<br>

<button onclick="checkAnswer()">Responder</button>

<div id="log"></div>

</div>

<script>

let npcNames = {
npc1:"Aldeano Li",
npc2:"Estudiante Mei",

npc4:"Comerciante Wang"
}

let completedZones = {
saludos:false,
familia:false,
numeros:false,
lugares:false
}



let xp = 0
let level = 1

let currentQuestion = {}
let currentZone = ""
let currentNPC = "npc1"
let questionIndex = 0

let zones = {

saludos:{

npc1:[
{q:"¿Cómo se dice hola?",a:"你好"},
{q:"¿Cómo se dice adiós?",a:"再见"},

{q:"¿Cómo se dice hola otra vez?",a:"你好"}
],

npc2:[

{q:"¿Cómo dices 'me llamo Roberto'?",a:"我叫Roberto"},
{q:"¿Cómo dices 'yo soy estudiante'?",a:"我是学生"},
{q:"¿Cómo dices 'yo soy profesor'?",a:"我是老师"},
{q:"¿Cómo dices 'él es mi amigo'?",a:"他是我的朋友"},
{q:"¿Cómo dices 'ella es profesora'?",a:"她是老师"}
],

npc3:[
{q:"¿Qué significa '朋友'?",a:"amigo"},
{q:"¿Qué significa '中国'?",a:"china"},
{q:"¿Qué significa '美国'?",a:"estados unidos"},
{q:"¿Qué significa '学生'?",a:"estudiante"},
{q:"¿Qué significa '老师'?",a:"profesor"},
{q:"¿Qué significa '谢谢'?",a:"gracias"}
],

npc4:[
{q:"Traduce: 你好",a:"hola"},
{q:"Traduce: 谢谢你",a:"gracias"},
{q:"Traduce: 再见",a:"adios"},
{q:"Traduce: 我是学生",a:"soy estudiante"},
{q:"Traduce: 她是老师",a:"ella es profesora"},
{q:"Traduce: 他是我的朋友",a:"el es mi amigo"}
]

},

familia:{

npc1:[
{q:"¿Cómo se dice mamá?",a:"妈妈"},
{q:"¿Cómo se dice papá?",a:"爸爸"},
{q:"¿Cómo se dice hijo?",a:"儿子"},
{q:"¿Cómo se dice hija?",a:"女儿"},
{q:"¿Cómo se dice hermano mayor?",a:"哥哥"},
{q:"¿Cómo se dice hermana mayor?",a:"姐姐"}
],

npc2:[
{q:"¿Qué significa 妈妈?",a:"mama"},
{q:"¿Qué significa 爸爸?",a:"papa"},
{q:"¿Qué significa 儿子?",a:"hijo"},
{q:"¿Qué significa 女儿?",a:"hija"},
{q:"¿Qué significa 哥哥?",a:"hermano"},
{q:"¿Qué significa 姐姐?",a:"hermana"}
],

npc3:[
{q:"Traduce: 我妈妈",a:"mi mama"},
{q:"Traduce: 我爸爸",a:"mi papa"},
{q:"Traduce: 他是我哥哥",a:"el es mi hermano"},
{q:"Traduce: 她是我姐姐",a:"ella es mi hermana"},
{q:"Traduce: 我有一个儿子",a:"tengo un hijo"},
{q:"Traduce: 我有一个女儿",a:"tengo una hija"}
],

npc4:[
{q:"Completa: 我___妈妈",a:"有"},
{q:"Completa: 他是我___",a:"哥哥"},
{q:"Completa: 她是我___",a:"姐姐"},
{q:"Completa: 我有一个___",a:"儿子"},
{q:"Completa: 我有一个___",a:"女儿"},
{q:"Completa: 我___家人",a:"爱"}
]
},

numeros:{

npc1:[
{q:"¿Cómo se dice uno?",a:"一"},
{q:"¿Cómo se dice dos?",a:"二"},
{q:"¿Cómo se dice tres?",a:"三"},
{q:"¿Cómo se dice cuatro?",a:"四"},
{q:"¿Cómo se dice cinco?",a:"五"},
{q:"¿Cómo se dice diez?",a:"十"}
],

npc2:[
{q:"¿Qué significa 一?",a:"uno"},
{q:"¿Qué significa 二?",a:"dos"},
{q:"¿Qué significa 三?",a:"tres"},
{q:"¿Qué significa 四?",a:"cuatro"},

{q:"¿Qué significa 十?",a:"diez"}
],

{q:"Traduce: 三个人",a:"tres personas"},

],

]
},
lugares:{

npc1:[
{q:"¿Cómo se dice escuela?",a:"学校"},
{q:"¿Cómo se dice hospital?",a:"医院"},
{q:"¿Cómo se dice tienda?",a:"商店"},

],

npc2:[
{q:"¿Qué significa 学校?",a:"escuela"},
{q:"¿Qué significa 医院?",a:"hospital"},
{q:"¿Qué significa 商店?",a:"tienda"},

],

{q:"Traduce: 我在学校",a:"estoy en la escuela"},
{q:"Traduce: 他在医院",a:"el esta en el hospital"},
{q:"Traduce: 我去商店",a:"voy a la tienda"},
{q:"Traduce: 我回家",a:"voy a casa"},
{q:"Traduce: 他在中国",a:"el esta en china"},
{q:"Traduce: 她在美国",a:"ella esta en estados unidos"}
],

npc4:[
{q:"Completa: 我在___ (escuela)",a:"学校"},
{q:"Completa: 他在___ (hospital)",a:"医院"},
{q:"Completa: 我去___ (tienda)",a:"商店"},
{q:"Completa: 我回___ (casa)",a:"家"},
{q:"Completa: 他在___ (china)",a:"中国"},
{q:"Completa: 她在___ (usa)",a:"美国"}
]

}


}


let boss = [
{q:"Traduce: 她是我的汉语老师",a:"ella es mi profesora de chino"},
{q:"Traduce: 我想喝茶",a:"quiero tomar te"},
{q:"Traduce: 今天几号",a:"que fecha es hoy"}


]

function startZone(zone){

if(completedZones[zone]){
alert("✅ Ya completaste esta zona")
return
}

document.getElementById("game").style.display="block"

currentZone = zone

currentNPC = "npc1"

questionIndex = 0

document.getElementById("answer").value=""

loadQuestion()

}

function loadQuestion(){

if(currentZone=="boss"){

currentQuestion = boss[questionIndex]

}else{

let npcQuestions = zones[currentZone][currentNPC]

currentQuestion = npcQuestions[questionIndex]

}

document.getElementById("question").innerText =
currentQuestion.q

document.getElementById("log").innerText =
currentZone=="boss"
? "👹 Maestro Wang"
: "👤 Hablando con " + npcNames[currentNPC]

document.getElementById("answer").value = ""
document.getElementById("answer").focus()

}

function checkAnswer(){

let user =
document.getElementById("answer").value.trim().toLowerCase()

let correct =
currentQuestion.a.toLowerCase()

if(user==correct){

xp+=20

document.getElementById("log").innerText="⚔️ Correcto +20XP"

}else{

document.getElementById("log").innerText=
"❌ Incorrecto. Respuesta: "+correct

}

if(xp>=100){

xp=0
level++

alert("🎉 SUBISTE A NIVEL "+level)

}

document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level

document.getElementById("answer").value=""

// avanzar pregunta
questionIndex++

let npcQuestions

if(questionIndex >= npcQuestions.length){

if(currentZone=="boss"){

alert("🏆 DERROTASTE AL MAESTRO WANG")

document.getElementById("game").style.display="none"

return

}

questionIndex = 0

if(currentNPC == "npc1") currentNPC = "npc2"
else if(currentNPC == "npc2") currentNPC = "npc3"
else if(currentNPC == "npc3") currentNPC = "npc4"
else{

alert("🎉 Zona completada!")

completedZones[currentZone] = true

disableZone(currentZone)

currentNPC = "npc1"

document.getElementById("game").style.display="none"

return
}

}

loadQuestion()

}
function disableZone(zone){

let buttons = document.querySelectorAll(".zone")

buttons.forEach(btn =>{

if(btn.getAttribute("onclick").includes(zone)){

btn.style.opacity = "0.4"
btn.style.pointerEvents = "none"
btn.innerHTML += " ✔"

}

})

}
document.getElementById("answer").addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkAnswer()
}
})
</script>

</body>

</html>
